name: Update README

on:
  push:
    branches: [main]
    paths:
      # Trigger when a solution file is added/changed (flat topic dirs)
      - "*/*.py"
      - "*/*.java"
      - "*/*.cpp"
      - "*/*.ts"
      - "*/*.go"
      - "*/*.rs"
      # Also re-run if the script itself changes
      - "scripts/update_readme.py"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-readme:
    name: Regenerate README tables
    runs-on: ubuntu-latest
    # Don't run on commits made by this workflow (prevents infinite loops)
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write   # needed to push the README commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git log works if needed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        run: python scripts/update_readme.py

      - name: Commit & push (if README changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "README unchanged — nothing to commit."
          else
            git commit -m "docs: auto-update README [skip ci]"
            git push
          fi
